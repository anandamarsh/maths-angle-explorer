<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark green background -->
  <rect width="64" height="64" rx="12" fill="#0c1f13"/>

  <!-- Horizontal reference ray (bright) -->
  <line x1="32" y1="46" x2="58" y2="46"
        stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Barrel ray at 135° (bright, behind the green barrel) -->
  <line x1="32" y1="46" x2="14" y2="28"
        stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Yellow angle arc — inside the angle (CCW on screen, sweepFlag=0) -->
  <!-- r=16, start=(48,46), end=(20.7,34.7) passing through the top region -->
  <path d="M 48 46 A 16 16 0 0 0 20.7 34.7"
        stroke="#facc15" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- "?" inside the angle -->
  <text x="40" y="36" font-size="9" fill="#facc15"
        font-family="monospace" font-weight="bold">?</text>

  <!-- Cannon barrel — tapered polygon (wide at base, narrow at tip) -->
  <!-- Direction 135°: normalized (-0.707,-0.707), perp (0.707,-0.707) -->
  <!-- Base half-width=2.2, tip half-width=0.8 -->
  <polygon points="33.56,44.44 16.57,29.43 15.43,30.57 30.44,45.56"
           fill="#4ade80"/>

  <!-- Cannon body -->
  <rect x="23" y="42" width="18" height="8" rx="2.5" fill="#166534"/>
  <rect x="23" y="42" width="18" height="8" rx="2.5"
        fill="none" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Left wheel -->
  <circle cx="26.5" cy="51" r="3.5" fill="#0c1f13" stroke="#4ade80" stroke-width="1.5"/>
  <circle cx="26.5" cy="51" r="1"   fill="#4ade80"/>

  <!-- Right wheel -->
  <circle cx="37.5" cy="51" r="3.5" fill="#0c1f13" stroke="#4ade80" stroke-width="1.5"/>
  <circle cx="37.5" cy="51" r="1"   fill="#4ade80"/>

  <!-- Pivot hub -->
  <circle cx="32" cy="46" r="3"   fill="#4ade80"/>
  <circle cx="32" cy="46" r="1.2" fill="#0c1f13"/>
</svg>
