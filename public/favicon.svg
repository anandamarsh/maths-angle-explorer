<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark green background with rounded corners -->
  <rect width="64" height="64" rx="12" fill="#0c1f13"/>

  <!-- Horizontal reference ray (right) -->
  <line x1="32" y1="46" x2="58" y2="46" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Barrel ray at 135° (upper-left), white behind the green barrel -->
  <line x1="32" y1="46" x2="14" y2="28" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Yellow angle arc from 0° to 135° (CCW math = CW on screen) -->
  <!-- r=16, start=(48,46), end=(32+16*cos135, 46-16*sin135)=(20.7,34.7) -->
  <path d="M 48 46 A 16 16 0 0 1 20.7 34.7"
        stroke="#facc15" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- "?" label for the unknown angle -->
  <text x="44" y="38" font-size="9" fill="#facc15"
        font-family="monospace" font-weight="bold">?</text>

  <!-- Cannon barrel (thick green line along 135° direction) -->
  <line x1="32" y1="46" x2="16" y2="30"
        stroke="#4ade80" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Cannon body -->
  <rect x="23" y="42" width="18" height="8" rx="2.5" fill="#166534"/>
  <rect x="23" y="42" width="18" height="8" rx="2.5" fill="none" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Left wheel -->
  <circle cx="26.5" cy="51" r="3.5" fill="#0c1f13" stroke="#4ade80" stroke-width="1.5"/>
  <circle cx="26.5" cy="51" r="1"   fill="#4ade80"/>

  <!-- Right wheel -->
  <circle cx="37.5" cy="51" r="3.5" fill="#0c1f13" stroke="#4ade80" stroke-width="1.5"/>
  <circle cx="37.5" cy="51" r="1"   fill="#4ade80"/>

  <!-- Pivot hub -->
  <circle cx="32" cy="46" r="3" fill="#4ade80"/>
  <circle cx="32" cy="46" r="1.2" fill="#0c1f13"/>
</svg>
